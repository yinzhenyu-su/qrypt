name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Vet
        run: |
          go vet ./pkg/... \
                ./internal/config/... \
                ./internal/control/... \
                ./internal/driver/... \
                ./internal/httputil/... \
                ./internal/logging/...

      - name: Test
        run: |
          go test -count=1 ./pkg/... \
                         ./internal/config/... \
                         ./internal/control/... \
                         ./internal/driver/... \
                         ./internal/httputil/... \
                         ./internal/logging/...

  dist:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
