name: CI

on:
  push:
    branches: [main, feat/*]
    tags: [v*]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Vet
        run: |
          go vet ./pkg/... \
                ./internal/config/... \
                ./internal/control/... \
                ./internal/driver/... \
                ./internal/httputil/... \
                ./internal/logging/...

      - name: Test
        run: |
          go test -count=1 ./pkg/... \
                         ./internal/config/... \
                         ./internal/control/... \
                         ./internal/driver/... \
                         ./internal/httputil/... \
                         ./internal/logging/...

  dist-linux-windows:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - run: mkdir -p dist

      - name: Build linux/amd64
        run: |
          docker buildx build --platform linux/amd64 --load -t qrypt:amd64 .
          docker create --name qrypt-linux-amd64 qrypt:amd64
          docker cp qrypt-linux-amd64:/usr/local/bin/qrypt dist/qrypt-linux-amd64
          docker rm qrypt-linux-amd64

      - name: Build linux/arm64
        run: |
          docker buildx build --platform linux/arm64 --load -t qrypt:arm64 .
          docker create --name qrypt-linux-arm64 qrypt:arm64
          docker cp qrypt-linux-arm64:/usr/local/bin/qrypt dist/qrypt-linux-arm64
          docker rm qrypt-linux-arm64

      - name: Build windows/amd64
        run: |
          docker build -f Dockerfile.windows -t qrypt:windows .
          docker create --name qrypt-win --entrypoint /qrypt-windows-amd64.exe qrypt:windows
          docker cp qrypt-win:/qrypt-windows-amd64.exe dist/qrypt-windows-amd64.exe
          docker rm qrypt-win

      - name: Build windows/arm64
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -tags nocgo -ldflags="-s -w" \
            -o dist/qrypt-windows-arm64.exe ./cmd/qrypt/

      - uses: actions/upload-artifact@v7
        with:
          name: qrypt-${{ github.ref_name }}
          path: dist/*

  dist-darwin:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install macFUSE
        run: |
          brew install --cask macfuse

      - run: mkdir -p dist

      - name: Build darwin/amd64
        run: |
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=1 go build -ldflags="-s -w" \
            -o dist/qrypt-darwin-amd64 ./cmd/qrypt/

      - name: Build darwin/arm64
        run: |
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 go build -ldflags="-s -w" \
            -o dist/qrypt-darwin-arm64 ./cmd/qrypt/

      - uses: actions/upload-artifact@v7
        with:
          name: qrypt-darwin-${{ github.ref_name }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [dist-linux-windows, dist-darwin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          pattern: qrypt-*
          merge-multiple: true
          path: dist/

      - uses: goreleaser/goreleaser-action@v7
        with:
          args: release --clean
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
