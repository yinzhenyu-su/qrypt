name: CI

on:
  push:
    branches: [main, feat/*]
    tags: [v*]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Vet
        run: |
          go vet ./pkg/... \
                ./internal/config/... \
                ./internal/control/... \
                ./internal/driver/... \
                ./internal/httputil/... \
                ./internal/logging/...

      - name: Test
        run: |
          go test -count=1 ./pkg/... \
                         ./internal/config/... \
                         ./internal/control/... \
                         ./internal/driver/... \
                         ./internal/httputil/... \
                         ./internal/logging/...

  dist-linux-windows:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            platform: linux/amd64
            output: qrypt-linux-amd64
            kind: linux-docker
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            output: qrypt-linux-arm64
            kind: linux-docker
          - target: windows-amd64
            runner: ubuntu-latest
            platform: linux/amd64
            output: qrypt-windows-amd64.exe
            kind: windows-docker
          - target: windows-arm64
            runner: ubuntu-latest
            output: qrypt-windows-arm64.exe
            kind: windows-go
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        if: matrix.kind == 'windows-go'
        with:
          go-version: "1.26"
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        if: matrix.kind != 'windows-go'

      - run: mkdir -p dist

      - name: Build ${{ matrix.target }} with Docker
        if: matrix.kind == 'linux-docker'
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --cache-from type=gha,scope=qrypt-${{ matrix.target }} \
            --cache-to type=gha,mode=max,scope=qrypt-${{ matrix.target }} \
            --load \
            -t qrypt:${{ matrix.target }} .
          docker create --name qrypt-${{ matrix.target }} qrypt:${{ matrix.target }}
          docker cp qrypt-${{ matrix.target }}:/usr/local/bin/qrypt dist/${{ matrix.output }}
          docker rm qrypt-${{ matrix.target }}

      - name: Build ${{ matrix.target }} with Docker
        if: matrix.kind == 'windows-docker'
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --cache-from type=gha,scope=qrypt-${{ matrix.target }} \
            --cache-to type=gha,mode=max,scope=qrypt-${{ matrix.target }} \
            --load \
            -f Dockerfile.windows \
            -t qrypt:${{ matrix.target }} .
          docker create --name qrypt-${{ matrix.target }} --entrypoint /qrypt-windows-amd64.exe qrypt:${{ matrix.target }}
          docker cp qrypt-${{ matrix.target }}:/qrypt-windows-amd64.exe dist/${{ matrix.output }}
          docker rm qrypt-${{ matrix.target }}

      - name: Build windows/arm64
        if: matrix.kind == 'windows-go'
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -tags nocgo -ldflags="-s -w" \
            -o dist/qrypt-windows-arm64.exe ./cmd/qrypt/

      - uses: actions/upload-artifact@v7
        with:
          name: qrypt-${{ matrix.target }}-${{ github.ref_name }}
          path: dist/*

  dist-darwin:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install macFUSE
        run: |
          brew install --cask macfuse

      - run: mkdir -p dist

      - name: Build darwin/amd64
        run: |
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=1 go build -ldflags="-s -w" \
            -o dist/qrypt-darwin-amd64 ./cmd/qrypt/

      - name: Build darwin/arm64
        run: |
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 go build -ldflags="-s -w" \
            -o dist/qrypt-darwin-arm64 ./cmd/qrypt/

      - uses: actions/upload-artifact@v7
        with:
          name: qrypt-darwin-${{ github.ref_name }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [dist-linux-windows, dist-darwin]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          pattern: qrypt-*
          merge-multiple: true
          path: dist/

      - uses: goreleaser/goreleaser-action@v7
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
