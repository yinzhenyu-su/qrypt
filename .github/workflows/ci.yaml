name: CI

on:
  push:
    branches: [main, feat/*]
    tags: [v*]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 ./...

      - name: Localfs Smoke
        run: scripts/smoke-localfs.sh

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Race Test
        run: go test -race -count=1 ./pkg/vfs ./pkg/drive ./internal/control ./internal/logging ./cmd/qrypt

  dist-linux-windows:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            platform: linux/amd64
            output: qrypt-linux-amd64
            goos: linux
            goarch: amd64
            archive_format: tar.gz
            kind: linux-docker
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            output: qrypt-linux-arm64
            goos: linux
            goarch: arm64
            archive_format: tar.gz
            kind: linux-docker
          - target: windows-amd64
            runner: ubuntu-latest
            output: qrypt-windows-amd64.exe
            goos: windows
            goarch: amd64
            archive_format: zip
            kind: windows-go
          - target: windows-arm64
            runner: ubuntu-latest
            output: qrypt-windows-arm64.exe
            goos: windows
            goarch: arm64
            archive_format: zip
            kind: windows-go
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        if: matrix.kind == 'windows-go'
        with:
          go-version: "1.26"
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        if: matrix.kind == 'linux-docker'

      - run: mkdir -p dist

      - name: Build ${{ matrix.target }} with Docker
        if: matrix.kind == 'linux-docker'
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --cache-from type=gha,scope=qrypt-${{ matrix.target }} \
            --cache-to type=gha,mode=max,scope=qrypt-${{ matrix.target }} \
            --load \
            -t qrypt:${{ matrix.target }} .
          docker create --name qrypt-${{ matrix.target }} qrypt:${{ matrix.target }}
          docker cp qrypt-${{ matrix.target }}:/usr/local/bin/qrypt dist/${{ matrix.output }}
          docker rm qrypt-${{ matrix.target }}

      - name: Build ${{ matrix.target }}
        if: matrix.kind == 'windows-go'
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=${{ matrix.goarch }} go build -tags nocgo -ldflags="-s -w" \
            -o dist/${{ matrix.output }} ./cmd/qrypt/

      - name: Package ${{ matrix.target }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          asset="qrypt_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.archive_format }}" = "zip" ]; then
            (cd dist && zip "${asset}.zip" "${{ matrix.output }}")
          else
            tar -C dist -czf "dist/${asset}.tar.gz" "${{ matrix.output }}"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: qrypt-${{ matrix.target }}-${{ github.ref_name }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  dist-darwin:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install macFUSE
        run: |
          brew install --cask macfuse

      - run: mkdir -p dist

      - name: Build darwin/amd64
        run: |
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=1 go build -ldflags="-s -w" \
            -o dist/qrypt-darwin-amd64 ./cmd/qrypt/

      - name: Build darwin/arm64
        run: |
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 go build -ldflags="-s -w" \
            -o dist/qrypt-darwin-arm64 ./cmd/qrypt/

      - name: Package darwin binaries
        run: |
          version="${GITHUB_REF_NAME#v}"
          tar -C dist -czf "dist/qrypt_${version}_darwin_amd64.tar.gz" qrypt-darwin-amd64
          tar -C dist -czf "dist/qrypt_${version}_darwin_arm64.tar.gz" qrypt-darwin-arm64

      - uses: actions/upload-artifact@v7
        with:
          name: qrypt-darwin-${{ github.ref_name }}
          path: dist/*.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [dist-linux-windows, dist-darwin]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          pattern: qrypt-*
          merge-multiple: true
          path: dist/

      - uses: goreleaser/goreleaser-action@v7
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
