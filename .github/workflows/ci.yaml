name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  # ── Check: vet + test ────────────────────────────────────────────
  check:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Vet
        run: |
          go vet ./pkg/... \
                ./internal/config/... \
                ./internal/control/... \
                ./internal/driver/... \
                ./internal/httputil/... \
                ./internal/logging/... \
                ./internal/mount/...

      - name: Test
        run: |
          go test -count=1 ./pkg/... \
                         ./internal/config/... \
                         ./internal/control/... \
                         ./internal/driver/... \
                         ./internal/httputil/... \
                         ./internal/logging/...

  # ── Dist: cross-compile all platforms (macOS + Docker) ───────────
  dist:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build all
        run: make -j5 dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qrypt-${{ github.ref_name }}
          path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
